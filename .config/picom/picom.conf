# Getting started
# https://github.com/yshui/picom/blob/next/picom.sample.conf
# https://picom.app/

# Shadows
shadow = true;
shadow-radius = 8;
shadow-opacity = .8;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-color = "#121212";

# Fading
fading = true;
fade-in-step = 0.08;
fade-out-step = 0.08;
fade-delta = 10;
no-fading-openclose = false;

# Transparency / Opacity
frame-opacity = .8;
inactive-dim-fixed = false

# Corners
corner-radius = 8;

# Blur
blur-method = "dual_kawase";
blur-strength = 8;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;
blur-kern = "3x3box";

# General Settings
backend = "glx";
dithered-present = false;
vsync = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;
dithered-present = true;

# Rules
rules: (
  {
    match = "window_type = 'dock' || window_type = 'desktop' || window_type = 'menu' || window_type = 'dropdown_menu' || window_type = 'popup_menu' || window_type = 'dnd' || window_type = 'splash' || "
            "class_g = 'slop' || class_g = 'Google-chrome' || class_g = 'Zathura' || class_g = 'dmenu' || class_g = 'sxiv' || class_g = 'jetbrains-studio' || class_g = 'Nsxiv' || "
            "_GTK_FRAME_EXTENTS@";
    blur-background = false;
    opacity = 1;
  },
  {
    match = "window_type = 'dropdown_menu' || window_type = 'popup_menu' || window_type = 'menu' || window_type = 'dnd' || "
            "class_g = 'dwm' || name = 'Notification' || _GTK_FRAME_EXTENTS@";
    shadow = false;
  }, 
  {
    match = "class_g = 'dwm' || class_g = 'dmenu' || class_g = 'st-256color' || class_g = 'Nsxiv' || class_g = 'Zathura'";
    corner-radius = 0;
  },
  {
    match = "class_g = 'scrcpy'";
    corner-radius = 30;
  }, 
  {
    match = "class_g = 'Code'";
    blur-background = true;
    opacity = 1;
  },
  {
    match = "class_g = 'dwm'";
    blur-background = false;
    opacity = .8;
  },
  {
    match = "window_type = 'tooltip'";
    fade = false;
    shadow = true;
    opacity = 1;
    full-shadow = false;
  },
)
